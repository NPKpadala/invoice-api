<!DOCTYPE html>
<html>
<head>
    <title>Indian GST Invoice Extractor</title>
    <style>
        body { font-family: Arial; max-width: 800px; margin: 50px auto; padding: 20px; }
        h1 { color: #2c3e50; }
        .upload-box { border: 2px dashed #3498db; padding: 40px; text-align: center; border-radius: 10px; }
        button { background: #3498db; color: white; padding: 10px 30px; border: none; border-radius: 5px; cursor: pointer; font-size: 16px; }
        #result { margin-top: 20px; padding: 20px; background: #f8f9fa; border-radius: 5px; white-space: pre-wrap; }
    </style>
</head>
<body>
    <h1>🧾 Indian GST Invoice Extractor</h1>
    <p>Upload any GST invoice image and extract text instantly!</p>
    <div class="upload-box">
        <input type="file" id="fileInput" accept="image/*,.pdf"><br><br>
        <button onclick="extractInvoice()">Extract Invoice Data</button>
    </div>
    <div id="result"></div>
    <script>
        async function extractInvoice() {
            const file = document.getElementById('fileInput').files[0];
            if (!file) { alert('Please select a file!'); return; }
            document.getElementById('result').innerHTML = '⏳ Extracting...';
            const formData = new FormData();
            formData.append('file', file);
            const response = await fetch('/extract', { method: 'POST', body: formData });
            const data = await response.json();
            document.getElementById('result').innerHTML = '✅ Extracted Text:\n\n' + data.extracted_text;
        }
    </script>
</body>
</html>
